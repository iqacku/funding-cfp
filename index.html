<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Funding Calls Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">

    <div class="text-center mb-4">
        <h1 class="fw-bold">Research Funding Calls Portal</h1>
        <p class="text-muted">
            Automatically updated funding opportunities from VIT Chennai SPORIC
        </p>
    </div>

    <div class="row mb-4">
        <div class="col-md-6 mb-2">
            <input type="text" id="searchInput" class="form-control"
                   placeholder="Search proposals...">
        </div>

        <div class="col-md-3 mb-2">
            <select id="agencyFilter" class="form-select">
                <option value="">All Agencies</option>
            </select>
        </div>

        <div class="col-md-3 mb-2">
            <button class="btn btn-primary w-100" onclick="sortByDeadline()">
                Sort by Deadline
            </button>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Agency</th>
                    <th>Scheme</th>
                    <th>Deadline</th>
                    <th>Apply</th>
                </tr>
            </thead>

            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <footer class="text-center mt-5 text-muted">
        Data source:
        <a href="https://chennai.vit.ac.in/research/sponsoredresearch/call-for-proposals/"
           target="_blank">
           VIT Chennai SPORIC
        </a>
    </footer>

</div>

<script src="script.js"></script>
</body>
</html>
